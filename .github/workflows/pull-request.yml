name: Release and Publish

on:
  pull_request:
    types: [closed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Jira Ticket ID (e.g., ELOR-2367)"
        required: false
        type: string
      release_type:
        description: "Release type (major/minor/patch). If provided, skips semantic-release analysis."
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
          - keep
      NPM_PAT:
        description: "NPM Personal Access Token for publishing to npm registry."
        required: false
        type: string

jobs:
  release:
    uses: odp-ecom/io-reusable-workflow/.github/workflows/release.yml@main
    secrets: inherit
    with:
      jira_id: ${{ inputs.jira_id }}
      release_type: ${{ inputs.release_type }}
